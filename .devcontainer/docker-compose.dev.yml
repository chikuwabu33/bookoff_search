services:
  # Dev Containerз”Ё гѓђгѓѓг‚Їг‚Ёгѓігѓ‰г‚µгѓјгѓ“г‚№
  backend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: bookoff-devcontainer
    ports:
      - "8000:8000"
      - "5678:5678"  # Python debugger
    volumes:
      - ../app:/app
      - /app/__pycache__
    environment:
      - DEBUG=True
      - PYTHONUNBUFFERED=1
    networks:
      - bookoff-network
    stdin_open: true
    tty: true
    # devcontainerз”ЁгЃ«й•·ж™‚й–“е®џиЎЊг‚’з¶љгЃ‘г‚‹
    command: /bin/bash

networks:
  bookoff-network:
    driver: bridge
