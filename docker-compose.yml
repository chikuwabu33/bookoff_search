version: '3.8'

services:
  bookoff_search_backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    volumes:
      - bookoff_data:/app/data
      - bookoff_logs:/app/logs
    env_file:
      - ./.env
    environment:
      - DATA_DIR=/app/data
      - TZ=Asia/Tokyo
    ports:
      - "8000:8000"

  bookoff_search_frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    volumes:
      - bookoff_data:/app/data
      - bookoff_logs:/app/logs
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - TZ=Asia/Tokyo
      - BACKEND_URL=http://bookoff_search_backend:8000
    ports:
      - "8501:8501"

volumes:
  bookoff_data:
  bookoff_logs: